name: Telegram Bot (interaktiv)

# telegram-notify.yml dan farqli — bu workflow scripts/telegram-bot.js ni
# ishga tushiradi. Aynan shu skript botga kelgan /start va boshqa
# xabarlarni o'qiydi, "kutayotgan" adminlarni (telefon/username bilan
# qo'shilgan) Chat ID bilan bog'laydi va admin buyruqlariga
# (/qarzlar, /tolov, /statistika va h.k.) javob beradi.
#
# Ushbu fayl bo'lmasa, "Admin qo'shish"da admin doim "⏳ Kutmoqda"da qolib
# ketadi — chunki botga yozilgan xabarni hech kim o'qib, tasdiqlamaydi.

on:
  schedule:
    # Har 5 daqiqada ishga tushadi (GitHub cron aniq vaqtga kafolat bermaydi,
    # ba'zida 5-15 daqiqa kechikish/o'tkazib yuborish bo'lishi mumkin — bu
    # GitHub'ning o'zining cheklovi, normal holat)
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # "Actions" bo'limidan qo'lda ham ishga tushirish mumkin

# MUHIM: ikkita run BIR VAQTDA ishlab ketmasligi uchun. Agar oldingi run hali
# tugamagan bo'lsa (yoki siz qo'lda "Run workflow" bossangiz), Telegram bitta
# bot tokeniga faqat BITTA getUpdates so'rovchisiga ruxsat beradi — ikkinchisi
# "Conflict" xatosi bilan to'xtaydi. Shu sabab avvalgi run tugagunicha,
# keyingisi navbatda kutadi (bekor qilinmaydi, faqat kutadi).
concurrency:
  group: telegram-bot-poll
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'ni yuklab olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bog'liqliklarni o'rnatish
        run: npm install

      - name: Botni ishga tushirish
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run bot
