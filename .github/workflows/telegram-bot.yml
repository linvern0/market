name: Telegram Bot Polling

on:
  schedule:
    # Har 5 daqiqada ishga tushadi. DIQQAT: GitHub Actions cron aniq vaqtda
    # emas — yukka qarab bir necha daqiqa kechikishi mumkin (bu normal).
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # "Run workflow" tugmasi bilan qo'lda ham ishga tushirish mumkin

# Bir vaqtning o'zida faqat bitta nusxa ishlasin — aks holda ikkita parallel
# run bir xil update'larni ikki marta o'qib, ikki marta javob yuborishi mumkin.
concurrency:
  group: telegram-bot-polling
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Repo'ni olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bog'liqliklarni o'rnatish
        run: npm install --omit=dev

      - name: Botni ishga tushirish
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run bot
